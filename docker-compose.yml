services:
  app:
    build:
      context: .
      target: dev
      dockerfile: app/Dockerfile
    image: epicstory-app:latest
    container_name: epicstory-app
    working_dir: /home/node/ws/app
    entrypoint:
      - docker-dev-entrypoint.sh
    command: pnpm dev
    ports:
      - 8080:8080
    environment:
      EPIC_WORKSPACE_ROOT: /home/node/ws
      # Vite HMR through Caddy (https://epicstory.io)
      VITE_PROXY_HMR: "true"
      VITE_HMR_HOST: epicstory.io
      VITE_HMR_PROTOCOL: wss
      VITE_HMR_CLIENT_PORT: "443"
    volumes:
      # Monorepo bind mount; keep image node_modules (pnpm hoists at workspace root)
      - .:/home/node/ws
      - app_node_modules:/home/node/ws/node_modules
      - app_package_node_modules:/home/node/ws/app/node_modules
  api:
    build:
      context: .
      target: dev
      dockerfile: api/Dockerfile
    image: epicstory-api:latest
    container_name: epicstory-api
    working_dir: /home/node/app/api
    entrypoint:
      - docker-dev-entrypoint.sh
    # Use start:debug to enable debugging (attach with VS Code)
    # Use start:dev for normal development without debugging
    command: pnpm start:debug
    ports:
      - 3000:3000
      - 9229:9229 # Node.js debug port for VS Code attachment
    env_file:
      - ./api/.env
    environment:
      EPIC_WORKSPACE_ROOT: /home/node/app
      DEBUG: true
      DATABASE_HOST: epicstory-postgres
      REDIS_URL: "redis://epicstory-redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/home/node/app
      - api_node_modules:/home/node/app/node_modules
      - api_package_node_modules:/home/node/app/api/node_modules
    # labels:
    #   - traefik.enable=true
    #   - traefik.http.routers.epicstory.rule=PathPrefix(`/`)
    #   - traefik.http.services.epicstory.loadBalancer.server.port=${API_PORT}
